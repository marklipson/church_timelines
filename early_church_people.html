<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Early Church Timeline: People and Events</title>
    <!-- defines 'people' -->
    <script src="people.js"></script>
    <!-- defines 'relationships' -->
    <script src="relationships.js"></script>
    <!-- defines 'timeline events' -->
    <script src="events.js"></script>
    <!-- draws timeline -->
    <script src="draw.js"></script>
    <link rel="stylesheet" href="timeline.css"/>
    <style>
        .cat_council {
          color: #e0e0e0;
          background-color: #809020;
        }
    </style>
</head>
<body>
  <h1>Early Church Timeline: People and Events</h1>
  <div id="timeline_area"></div>
  <div id="controls"></div>
</body>
<script>
  const timeline = new Timeline("timeline_area", [-10, 330]);
  timeline.setup();
  timeline.draw();
  timeline.draw_key(
    [
      {"text": "people:"},
      {"item": {title: "apostle", class: "cat_apostle", description: "The 12 apostles (see also: evangelists)"}},
      {"item": {title: "evangelist", class: "cat_evangelist", description: "The writers of the 4 gospels"}},
      {"item": {title: "martyr", class: "x_martyr", description: "Those who died for Christ (and Christ Himself)"}},
      {"item": {title: "bishop", class: "cat_bishop", description: "Bishops and patriarchs"}},
      {"item": {title: "monk", class: "cat_monk", description: "Monastics"}},
      {"item": {title: "writer", class: "cat_writer", description: "People with surviving writings"}},
      {"item": {title: "emperor/empress", class: "cat_emperor", description: "Emperors and empresses of Byzantium"}},
      {"text": "<br>events:"},
      {"item": {title: "persecutions", class: "cat_persecution-light", description: "Mass killings of Christians."}},
      {"item": {title: "council", class: "cat_council", description: "Church councils."}},
      {"item": {title: "other", class: "cat_history", description: "Other historical events."}},
    ]
  );
</script>
</html>
